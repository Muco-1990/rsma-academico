<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Painel de Edições | RSMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-white border-b py-6 px-12 flex justify-between items-center">
        <h1 class="text-xl font-black text-slate-900 tracking-widest">RSMA <span class="text-blue-600">ACADEMY</span></h1>
        <button id="btnSair" class="text-sm font-bold text-red-500 hover:underline">Sair com Segurança</button>
    </header>

    <main class="max-w-6xl mx-auto py-16 px-6">
        <div class="mb-12">
            <h2 class="text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">Edições do Curso</h2>
            <p class="text-slate-600 text-lg">Selecione a edição específica do ano que deseja frequentar.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-10">
            <script>
                const anos = [2025, 2026];
                anos.forEach(ano => {
                    document.write(`
                        <div class="bg-white border border-slate-200 p-8 rounded-3xl shadow-sm hover:shadow-md transition-all">
                            <span class="text-slate-400 font-black text-5xl mb-4 block">${ano}</span>
                            <h3 class="text-2xl font-bold text-slate-800 mb-4">Portfólio de Edições</h3>
                            <p class="text-slate-500 text-sm mb-8 leading-relaxed">Selecione abaixo qual edição de ${ano} pretende aceder para visualizar os materiais e o plano temático específico.</p>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <!-- Botão Edição 1 -->
                                <a href="programa_1.html?ano=${ano}&edicao=1" class="flex flex-col items-center justify-center p-6 bg-blue-50 border border-blue-100 rounded-2xl group hover:bg-blue-600 transition-all">
                                    <span class="text-blue-600 font-black text-2xl group-hover:text-white transition-colors">EDIÇÃO 1</span>
                                    <span class="text-[10px] font-bold text-blue-400 group-hover:text-blue-200 uppercase mt-1">Aceder</span>
                                </a>

                                <!-- Botão Edição 2 -->
                                <a href="programa.html?ano=${ano}&edicao=2" class="flex flex-col items-center justify-center p-6 bg-slate-50 border border-slate-100 rounded-2xl group hover:bg-slate-800 transition-all">
                                    <span class="text-slate-700 font-black text-2xl group-hover:text-white transition-colors">EDIÇÃO 2</span>
                                    <span class="text-[10px] font-bold text-slate-400 group-hover:text-slate-300 uppercase mt-1">Aceder</span>
                                </a>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        const firebaseConfig = { 
            apiKey: "222222xSyHjrvfYEh81h1bASGyuG0jzI",
            authDomain: "s222.firebaseapp.com",
            projectId: "s2222-cademy",
            storageBucket: "syrma-academy.firebasestorage.app",
            messagingSenderId: "33466875689",
            appId: "1:3423444567:web:5fe3bb4c068d935197e7b8",
            measurementId: "G-3PDDTH97VE" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btnSair').onclick = () => {
            signOut(auth).then(() => { window.location.href = "index.html"; });
        };
    </script>
</body>
</html>
